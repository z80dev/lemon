name: Release Smoke Tests

# Assembles runtime releases, verifies they start and pass doctor checks,
# then tears down. Runs on PRs touching release-related files and weekly.

on:
  pull_request:
    paths:
      - "mix.exs"
      - "apps/lemon_core/lib/lemon_core/runtime/**"
      - "apps/lemon_core/lib/mix/tasks/lemon.doctor.ex"
      - ".github/workflows/release-smoke.yml"
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      profile:
        description: "Release profile to smoke-test"
        required: false
        default: "lemon_runtime_min"

env:
  MIX_ENV: prod
  LEMON_SECRETS_MASTER_KEY: "smoke-test-dummy-key-32-chars-!!"
  LEMON_CONTROL_PLANE_PORT: "14040"
  LEMON_WEB_PORT: "14080"
  LEMON_SIM_UI_PORT: "14090"

jobs:
  smoke-test:
    name: Smoke test (${{ matrix.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        profile:
          - lemon_runtime_min

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.2"
          elixir-version: "1.19.0"

      - name: Cache Mix deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-release-${{ hashFiles('mix.lock') }}-${{ matrix.profile }}
          restore-keys: |
            ${{ runner.os }}-mix-release-${{ hashFiles('mix.lock') }}-
            ${{ runner.os }}-mix-release-

      - name: Install deps
        run: mix deps.get --only prod

      - name: Compile (prod)
        run: mix compile

      - name: Build release
        run: mix release ${{ matrix.profile }} --overwrite
        env:
          MIX_ENV: prod

      - name: Write fixture config
        run: |
          mkdir -p ~/.lemon
          cat > ~/.lemon/config.toml <<'EOF'
          [defaults]
          provider = "anthropic"
          model = "claude-sonnet-4-20250514"

          [gateway]
          max_concurrent_runs = 1
          auto_resume = false
          enable_telegram = false
          EOF

      - name: Start release in background
        run: |
          RELEASE_BIN="./_build/prod/rel/${{ matrix.profile }}/bin/${{ matrix.profile }}"
          "$RELEASE_BIN" daemon
          echo "RELEASE_BIN=$RELEASE_BIN" >> "$GITHUB_ENV"
          echo "Release started. Waiting for control-plane..."
          sleep 5

      - name: Wait for control-plane healthz
        run: |
          for i in $(seq 1 15); do
            if curl -sS --max-time 2 "http://127.0.0.1:${LEMON_CONTROL_PLANE_PORT}/healthz" > /dev/null 2>&1; then
              echo "Control-plane healthy after $i attempts."
              exit 0
            fi
            sleep 2
          done
          echo "::error::Control-plane did not become healthy within 30 seconds."
          exit 1

      - name: Run doctor check via HTTP
        run: |
          RESPONSE=$(curl -sS --max-time 5 "http://127.0.0.1:${LEMON_CONTROL_PLANE_PORT}/healthz")
          echo "healthz response: $RESPONSE"

      - name: Run release smoke tests
        run: |
          MIX_ENV=test mix test \
            apps/lemon_core/test/lemon_core/release/ \
            --include smoke \
            --formatter ExUnit.CLIFormatter
        env:
          MIX_ENV: test
          LEMON_RUNTIME_SMOKE_PORT: ${{ env.LEMON_CONTROL_PLANE_PORT }}

      - name: Stop release
        if: always()
        run: |
          if [ -n "$RELEASE_BIN" ] && [ -f "$RELEASE_BIN" ]; then
            "$RELEASE_BIN" stop || true
          fi

      - name: Collect logs on failure
        if: failure()
        run: |
          LOG_DIR="./_build/prod/rel/${{ matrix.profile }}/tmp/log"
          if [ -d "$LOG_DIR" ]; then
            echo "=== Release logs ==="
            cat "$LOG_DIR"/*.log 2>/dev/null || echo "(no log files found)"
          fi

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-smoke-logs-${{ matrix.profile }}-${{ github.run_id }}
          path: |
            _build/prod/rel/${{ matrix.profile }}/tmp/log/
            ~/.lemon/config.toml
          retention-days: 7
