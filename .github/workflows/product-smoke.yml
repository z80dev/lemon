name: Product Smoke

# Validates the packaged runtime end-to-end: boots a release, checks HTTP/WebSocket
# control-plane health, runs a deterministic echo agent through WebSocket,
# checks the web endpoint for full profiles, runs skill lint, and exercises
# adaptive-eval gate checks.
# Complements release-smoke.yml (which focuses on assembly and boot only).

on:
  pull_request:
    paths:
      - "mix.exs"
      - "apps/**"
      - "priv/**"
      - ".github/workflows/product-smoke.yml"
  schedule:
    # Daily at 05:30 UTC (off-peak, intentionally not :00 or :30)
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      profile:
        description: "Release profile to test"
        required: false
        default: "lemon_runtime_full"

permissions:
  contents: read

env:
  MIX_ENV: prod
  LEMON_SECRETS_MASTER_KEY: "smoke-test-dummy-key-32-chars-!!"
  LEMON_CONTROL_PLANE_PORT: "14040"
  LEMON_WEB_PORT: "14080"
  LEMON_SIM_UI_PORT: "14090"
  LEMON_GATEWAY_NODE_COOKIE: "product-smoke-cookie"

jobs:
  product-smoke:
    name: Product smoke (${{ matrix.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      LEMON_STORE_PATH: /tmp/lemon-store
      LEMON_WEB_SECRET_KEY_BASE: product_smoke_secret_key_base_product_smoke_secret_key_base_product_smoke

    strategy:
      fail-fast: false
      matrix:
        profile:
          - ${{ github.event.inputs.profile || 'lemon_runtime_full' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.5"
          elixir-version: "1.19.5"

      - name: Cache Mix deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-product-smoke-${{ hashFiles('mix.lock') }}-${{ matrix.profile }}
          restore-keys: |
            ${{ runner.os }}-mix-product-smoke-${{ hashFiles('mix.lock') }}-
            ${{ runner.os }}-mix-product-smoke-

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y inotify-tools

      - name: Install deps
        run: mix deps.get --only prod

      - name: Compile (prod)
        run: mix compile

      - name: Build release
        run: mix release ${{ matrix.profile }} --overwrite
        env:
          MIX_ENV: prod

      # ── Config fixture ─────────────────────────────────────────────────────────

      - name: Write fixture config
        run: |
          mkdir -p ~/.lemon
          cat > ~/.lemon/config.toml <<'EOF'
          [defaults]
          provider = "anthropic"
          model = "claude-haiku-4-5-20251001"

          [gateway]
          max_concurrent_runs = 1
          auto_resume = false
          enable_telegram = false

          [features]
          routing_feedback       = "opt-in"
          skill_synthesis_drafts = "opt-in"
          EOF

      # ── Boot ──────────────────────────────────────────────────────────────────

      - name: Start release in background
        run: |
          RELEASE_BIN="./_build/prod/rel/${{ matrix.profile }}/bin/${{ matrix.profile }}"
          "$RELEASE_BIN" daemon
          echo "RELEASE_BIN=$RELEASE_BIN" >> "$GITHUB_ENV"
          echo "Release started. Waiting for control-plane..."
          sleep 6

      - name: Wait for control-plane healthz
        run: |
          for i in $(seq 1 20); do
            if curl -sS --max-time 2 "http://127.0.0.1:${LEMON_CONTROL_PLANE_PORT}/healthz" > /dev/null 2>&1; then
              echo "Control-plane healthy after $i attempts."
              exit 0
            fi
            sleep 2
          done
          echo "::error::Control-plane did not become healthy within 40 seconds."
          exit 1

      # ── Runtime health checks ─────────────────────────────────────────────────

      - name: Check control-plane healthz
        run: |
          RESPONSE=$(curl -sS --max-time 5 \
            "http://127.0.0.1:${LEMON_CONTROL_PLANE_PORT}/healthz")
          echo "healthz: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if d.get('ok') is True:
              print('Healthz ok')
              sys.exit(0)
          status = d.get('status', '')
          if status not in ('ok', 'degraded'):
              print(f'::error::Healthz returned unexpected status: {status}')
              sys.exit(1)
          print(f'Healthz status: {status}')
          "

      - name: Check control-plane WebSocket protocol
        run: |
          cat > /tmp/lemon_control_plane_ws_probe.exs <<'EOF'
          defmodule LemonProductSmoke.WSProbe do
            use WebSockex

            def handle_frame({:text, frame}, parent) do
              send(parent, {:ws_frame, frame})
              {:ok, parent}
            end

            def handle_frame(_frame, parent), do: {:ok, parent}
          end

          url = System.fetch_env!("LEMON_CONTROL_PLANE_WS_URL")
          parent = self()

          {:ok, pid} = WebSockex.start_link(url, LemonProductSmoke.WSProbe, parent)

          send_req = fn id, method, params ->
            frame = Jason.encode!(%{
              "type" => "req",
              "id" => id,
              "method" => method,
              "params" => params
            })

            :ok = WebSockex.send_frame(pid, {:text, frame})
          end

          receive_matching = fn match, timeout_ms ->
            deadline = System.monotonic_time(:millisecond) + timeout_ms

            receive_loop = fn receive_loop ->
              remaining = max(deadline - System.monotonic_time(:millisecond), 0)

              receive do
                {:ws_frame, frame} ->
                  decoded = Jason.decode!(frame)

                  if match.(decoded) do
                    decoded
                  else
                    receive_loop.(receive_loop)
                  end
              after
                remaining -> raise "timed out waiting for websocket response"
              end
            end

            receive_loop.(receive_loop)
          end

          receive_response = fn id, timeout_ms ->
            receive_matching.(fn frame -> frame["type"] == "res" and frame["id"] == id end, timeout_ms)
          end

          send_req.("connect-1", "connect", %{
            "client" => %{
              "id" => "product-smoke",
              "name" => "Product Smoke"
            }
          })

          hello =
            receive_matching.(fn frame -> frame["type"] == "hello-ok" end, 5_000)

          unless hello["type"] == "hello-ok" and is_list(hello["features"]["methods"]) and
                   "health" in hello["features"]["methods"] do
            raise "unexpected hello-ok frame: #{inspect(hello)}"
          end

          send_req.("health-1", "health", %{})
          health = receive_response.("health-1", 5_000)

          unless health["type"] == "res" and health["id"] == "health-1" and
                   health["ok"] == true and health["payload"]["ok"] == true do
            raise "unexpected health response: #{inspect(health)}"
          end

          prompt = "product-smoke-echo-#{System.unique_integer([:positive])}"

          send_req.("agent-1", "agent", %{
            "prompt" => prompt,
            "engine_id" => "echo",
            "session_key" => "agent:product-smoke:main",
            "idempotency_key" => "product-smoke-#{System.system_time(:millisecond)}"
          })

          agent = receive_response.("agent-1", 5_000)

          unless agent["ok"] == true and is_binary(agent["payload"]["run_id"]) do
            raise "unexpected agent response: #{inspect(agent)}"
          end

          send_req.("agent-wait-1", "agent.wait", %{
            "runId" => agent["payload"]["run_id"],
            "timeoutMs" => 10_000
          })

          completed = receive_response.("agent-wait-1", 15_000)

          unless completed["ok"] == true and completed["payload"]["ok"] == true and
                   completed["payload"]["answer"] == "Echo: #{prompt}" do
            raise "unexpected agent.wait response: #{inspect(completed)}"
          end

          IO.puts("control-plane websocket health and echo agent run ok")
          EOF

          MIX_ENV=prod mix run --no-start /tmp/lemon_control_plane_ws_probe.exs
        env:
          MIX_ENV: prod
          LEMON_CONTROL_PLANE_WS_URL: ws://127.0.0.1:${{ env.LEMON_CONTROL_PLANE_PORT }}/ws

      - name: Check web healthz for full profile
        run: |
          PROFILE="${{ matrix.profile }}"
          if [ "$PROFILE" != "lemon_runtime_full" ]; then
            echo "Skipping web health check for profile: $PROFILE"
            exit 0
          fi

          RESPONSE=$(curl -sS --max-time 5 \
            "http://127.0.0.1:${LEMON_WEB_PORT}/healthz")
          echo "web healthz: $RESPONSE"
          test "$RESPONSE" = "ok"

      # ── Release supportability ────────────────────────────────────────────────

      - name: Stop release before Mix checks
        run: |
          if [ -n "$RELEASE_BIN" ] && [ -f "$RELEASE_BIN" ]; then
            "$RELEASE_BIN" stop || true
          fi

      - name: Check release support bundle
        run: |
          BUNDLE_PATH="/tmp/lemon-release-support-bundle-${{ matrix.profile }}.zip"
          rm -f "$BUNDLE_PATH"
          "$RELEASE_BIN" eval "LemonCore.Doctor.CLI.bundle!(bundle_path: \"$BUNDLE_PATH\")"
          test -f "$BUNDLE_PATH"
          rm -f "$BUNDLE_PATH"

      # ── Skill lint ────────────────────────────────────────────────────────────

      - name: Lint built-in skills
        run: |
          MIX_ENV=dev mix deps.get
          mix lemon.skill.lint
        env:
          MIX_ENV: dev

      # ── Adaptive eval gates ───────────────────────────────────────────────────

      - name: Adaptive eval gate check (routing_feedback)
        run: |
          MIX_ENV=test mix run --no-start -e "
          alias LemonCore.RolloutGate
          # Gate check against empty store — we expect {:fail, [\"sample_size: ...\"]}.
          # This proves the gate module loads and executes without crashing.
          result = RolloutGate.evaluate_routing_from_store(%{total_records: 0, unique_fingerprints: 0}, [])
          case result do
            {:fail, failures} ->
              IO.puts(\"routing_feedback gate (expected fail on empty data): #{inspect(failures)}\")
            {:pass, _} ->
              IO.puts(\"::warning::routing_feedback gates passed on empty store — thresholds may be too loose\")
          end
          "
        env:
          MIX_ENV: test

      - name: Adaptive eval gate check (skill_synthesis_drafts)
        run: |
          MIX_ENV=test mix run --no-start -e "
          alias LemonCore.RolloutGate
          result = RolloutGate.evaluate_synthesis_from_run(%{total_candidates: 0, generated: [], skipped: []})
          case result do
            {:fail, failures} ->
              IO.puts(\"synthesis gate (expected fail on empty run): #{inspect(failures)}\")
            {:pass, _} ->
              IO.puts(\"::warning::synthesis gates passed on empty run — thresholds may be too loose\")
          end
          "
        env:
          MIX_ENV: test

      # ── Teardown ──────────────────────────────────────────────────────────────

      - name: Stop release
        if: always()
        run: |
          if [ -n "$RELEASE_BIN" ] && [ -f "$RELEASE_BIN" ]; then
            "$RELEASE_BIN" stop || true
          fi

      - name: Collect logs on failure
        if: failure()
        run: |
          LOG_DIR="./_build/prod/rel/${{ matrix.profile }}/tmp/log"
          if [ -d "$LOG_DIR" ]; then
            echo "=== Release logs ==="
            cat "$LOG_DIR"/*.log 2>/dev/null || echo "(no log files)"
          fi

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: product-smoke-logs-${{ matrix.profile }}-${{ github.run_id }}
          path: |
            _build/prod/rel/${{ matrix.profile }}/tmp/log/
            ~/.lemon/config.toml
          retention-days: 7
