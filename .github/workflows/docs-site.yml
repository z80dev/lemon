name: Docs Site

# Builds the VitePress docs site and checks for broken links.
#
# On pull requests: build + link-check (no deploy).
# On push to main:  build + link-check + deploy to GitHub Pages.
# workflow_dispatch: manual trigger for either environment.
#
# The docs site is OPTIONAL — it supplements but does not replace the
# repo markdown files, which remain the source of truth.
# See docs/README.md and docs/.vitepress/config.js.

on:
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs-site.yml"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to GitHub Pages? (true/false)"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: docs-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-check:
    name: Build + link check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # VitePress uses git history for lastUpdated

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/package.json

      - name: Install docs deps
        working-directory: docs
        run: npm install

      - name: Build site
        working-directory: docs
        run: npm run build

      - name: Check internal markdown links
        working-directory: docs
        run: |
          # Check all docs/**/*.md files for broken relative links.
          # Uses markdown-link-check installed in the docs package.
          find . -name "*.md" \
            ! -path "./.vitepress/*" \
            ! -path "./node_modules/*" \
            | xargs npx markdown-link-check \
                --config .mlc.json \
                --quiet \
                2>&1 | tee /tmp/link-check.log
          if grep -q "ERROR:" /tmp/link-check.log; then
            echo "::error::Broken links found. See output above."
            exit 1
          fi
        continue-on-error: true   # link check is informational until baseline is established

      - name: Upload build artifact (for deployment)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-and-check
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
