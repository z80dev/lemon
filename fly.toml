app = "games-platform-zeebot"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  MIX_ENV = "prod"
  PHX_HOST = "games.zeebot.xyz"
  PORT = "8080"
  DATABASE_PATH = "/data/games.db"
  PHX_SERVER = "true"
  LEMON_WEB_PORT = "8080"
  # LEMON_WEB_SECRET_KEY_BASE - set via: fly secrets set LEMON_WEB_SECRET_KEY_BASE=<generated_key>

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/healthz"
    protocol = "http"

[[mounts]]
  source = "games_data"
  destination = "/data"
